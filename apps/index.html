<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps | Recep Özgür Mih</title>

    <!-- SEO: x-default and Hreflang -->
    <link rel="alternate" hreflang="tr" href="https://recepozgur.com/tr/apps/" />
    <link rel="alternate" hreflang="en" href="https://recepozgur.com/en/apps/" />
    <link rel="alternate" hreflang="x-default" href="https://recepozgur.com/apps/" />
    <link rel="canonical" href="https://recepozgur.com/apps/" />

    <script>
        (function () {
            var lang = localStorage.getItem('portfolio-lang');
            if (!lang) {
                var browserLang = navigator.language || navigator.userLanguage;
                lang = browserLang.split('-')[0];
            }
            if (lang !== 'tr' && lang !== 'en') lang = 'tr';
            window.location.replace('/' + lang + '/apps/');
        })();
    </script>
</head>

    </div>
</body>

</html>
