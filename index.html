<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recep Ozgur MIH | AI-Driven Mobil Mühendis</title>
    <meta name="description"
        content="AI-augmented mobile engineer portfolio. Redirecting to language-specific version...">

    <!-- SEO: x-default and Hreflang -->
    <link rel="alternate" hreflang="tr" href="https://recepozgur.com/tr/" />
    <link rel="alternate" hreflang="en" href="https://recepozgur.com/en/" />
    <link rel="alternate" hreflang="x-default" href="https://recepozgur.com/" />
    <link rel="canonical" href="https://recepozgur.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/logo.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script>
        (function () {
            // Priority 1: LocalStorage
            var lang = localStorage.getItem('portfolio-lang');

            // Priority 2: Browser Language
            if (!lang) {
                var browserLang = navigator.language || navigator.userLanguage;
                lang = browserLang.split('-')[0];
            }

            // Default: tr
            if (lang !== 'tr' && lang !== 'en') {
                lang = 'tr';
            }

            // Redirect to the language version
            var path = window.location.pathname;
            // Clean up root path if it happens to be just /
            if (path === '/' || path === '/index.html') {
                window.location.replace('/' + lang + '/');
            } else {
                // For other root-level paths that might be handled by this file (if server redirects)
                // But generally index.html only handles /
                window.location.replace('/' + lang + '/');
            }
        })();
    </script>
</head>

<body
    style="background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <img src="/assets/logo.webp" alt="Logo" width="78" height="72" fetchpriority="high"
            style="width: 80px; height: auto; margin-bottom: 20px;">
        <p>Redirecting / Yönlendiriliyor...</p>
        <p style="font-size: 0.8rem; opacity: 0.5;">
            <a href="/tr/" style="color: #06b6d4; text-decoration: none;">Türkçe</a> |
            <a href="/en/" style="color: #06b6d4; text-decoration: none;">English</a>
        </p>
    </div>
</body>

</html>
